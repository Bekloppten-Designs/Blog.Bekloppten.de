<!DOCTYPE html>
<html lang="de">
<head>

    <link rel="stylesheet" href="https://bekloppten.de">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Der Banner-Bereich -->
    <header class="hero-section">
        <!-- Das Hintergrundvideo -->
        <video autoplay loop muted playsinline class="hero-video">
            <source src="Test.mp4" type="video/mp4">
            Ihr Browser unterstützt dieses Video-Format nicht.
        </video>

        <!-- Das große Logo oben links im Kasten -->
        <div class="logo-container">
            <img class="logo" src="https://bekloppten.de/Infra/Bilder/B%20Schwartz.png" alt="Logo">
        </div>

        <!-- Die zentrierte Überschrift im Kasten -->
        <div class="hero-content">
            <h1 class="Ueberschrift">Willkommen auf dem Blog von Bekloppten.de!</h1>
        </div>
    </header>

    <!-- Der Inhalt unter dem Banner -->
    <main class="main-content">

        <h2>Das ist Natürlich erst ein test Video</h2>
        <p>Joa handy unterstützung Kommt Später :)</p>



        <p>Das Schöne Videobanner Wäre ohne hilfe meines Guten Freundes Gemini Nicht möglich gewesen :)

        </p>

</html>
